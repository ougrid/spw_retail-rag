services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: python ui/gradio_app.py
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./data:/app/data
    ports:
      - "7860:7860"
    depends_on:
      - api

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/ingest.py --auto --recreate
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    profiles:
      - ingest

volumes:
  qdrant_storage:
